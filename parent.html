<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>EduNote · 학습 안내</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif;
    background: #f1f5f9; color: #1e293b; line-height: 1.5;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; min-height: 100vh; background: #f1f5f9; }
  .hero {
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: #fff; padding: 22px 18px 18px;
  }
  .hero .brand { font-size: 12px; font-weight: 700; opacity: .85; letter-spacing: .3px; }
  .hero .sname { font-size: 13px; font-weight: 600; opacity: .9; margin-top: 8px; }
  .hero .stu { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
  .hero .stu .name { font-size: 22px; font-weight: 800; }
  .hero .stu .cls {
    font-size: 12px; font-weight: 700; background: rgba(255,255,255,.22);
    padding: 2px 10px; border-radius: 999px;
  }
  .tabs {
    display: flex; position: sticky; top: 0; z-index: 5;
    background: #fff; border-bottom: 1px solid #e2e8f0;
  }
  .tabs button {
    flex: 1; border: none; background: none; padding: 13px 6px; font-size: 14px;
    font-weight: 700; color: #94a3b8; cursor: pointer; font-family: inherit;
    border-bottom: 2.5px solid transparent;
  }
  .tabs button.on { color: #4f46e5; border-bottom-color: #4f46e5; }
  .tabs button .cnt { font-size: 11px; color: #cbd5e1; font-weight: 700; }
  .tabs button.on .cnt { color: #a5b4fc; }
  .body { padding: 14px; }
  .card {
    background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 12px;
    border: 1px solid #e8edf3; box-shadow: 0 1px 2px rgba(15,23,42,.03);
  }
  .card .date {
    font-size: 12px; font-weight: 800; color: #4f46e5; margin-bottom: 2px;
  }
  .card .by { font-size: 11px; color: #94a3b8; font-weight: 600; }
  .sec { margin-top: 11px; }
  .sec:first-of-type { margin-top: 12px; }
  .sec .lbl {
    font-size: 11px; font-weight: 800; color: #fff; display: inline-block;
    padding: 2px 8px; border-radius: 6px; margin-bottom: 6px;
  }
  .item {
    font-size: 13.5px; color: #334155; padding: 3px 0; display: flex;
    gap: 7px; align-items: baseline;
  }
  .item .txt { flex: 1; white-space: pre-wrap; word-break: break-word; }
  .item .comp {
    flex: 0 0 auto; font-size: 11px; font-weight: 800; padding: 1px 7px;
    border-radius: 999px; white-space: nowrap;
  }
  .comp.hi { background: #dcfce7; color: #15803d; }
  .comp.mid { background: #fef9c3; color: #a16207; }
  .comp.lo { background: #fee2e2; color: #b91c1c; }
  .para { font-size: 13.5px; color: #334155; white-space: pre-wrap; word-break: break-word; }
  .memo {
    background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px;
    padding: 8px 10px; font-size: 13px; color: #92400e; white-space: pre-wrap; word-break: break-word;
  }
  .att-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: #fff; border: 1px solid #e8edf3; border-radius: 10px; margin-bottom: 8px;
  }
  .att-row .d { font-size: 13px; font-weight: 800; color: #334155; flex: 0 0 auto; min-width: 88px; }
  .att-row .v { font-size: 13px; color: #475569; flex: 1; }
  .badge { font-size: 11px; font-weight: 800; padding: 2px 9px; border-radius: 999px; white-space: nowrap; }
  .b-in { background: #dbeafe; color: #1d4ed8; }
  .b-out { background: #e0e7ff; color: #4338ca; }
  .b-ok { background: #dcfce7; color: #15803d; }
  .b-late { background: #fef3c7; color: #b45309; }
  .b-absent { background: #fee2e2; color: #b91c1c; }
  .b-makeup { background: #f3e8ff; color: #7e22ce; }
  .empty { text-align: center; color: #94a3b8; font-size: 13px; padding: 48px 16px; }
  .state { text-align: center; padding: 70px 24px; color: #64748b; }
  .state .ic { font-size: 34px; margin-bottom: 12px; }
  .state .t { font-size: 16px; font-weight: 800; color: #334155; margin-bottom: 6px; }
  .state .s { font-size: 13px; color: #94a3b8; }
  .foot { text-align: center; font-size: 11px; color: #cbd5e1; padding: 18px 0 28px; }
  .spin {
    width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top-color: #6366f1;
    border-radius: 50%; animation: sp .8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes sp { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <!-- 로딩/에러 상태 -->
  <div id="stateView" class="state">
    <div class="spin"></div>
    <div class="s">불러오는 중...</div>
  </div>

  <!-- 본문 -->
  <div id="mainView" class="hidden">
    <div class="hero">
      <div class="brand">EduNote · 학습 안내</div>
      <div class="sname" id="schoolName"></div>
      <div class="stu">
        <span class="name" id="stuName"></span>
        <span class="cls hidden" id="stuClass"></span>
      </div>
    </div>
    <div class="tabs">
      <button id="tab-hw" class="on" onclick="showTab('hw')">과제 <span class="cnt" id="cnt-hw"></span></button>
      <button id="tab-no" onclick="showTab('no')">알림장 <span class="cnt" id="cnt-no"></span></button>
      <button id="tab-at" onclick="showTab('at')">출결 <span class="cnt" id="cnt-at"></span></button>
    </div>
    <div class="body">
      <div id="pane-hw"></div>
      <div id="pane-no" class="hidden"></div>
      <div id="pane-at" class="hidden"></div>
    </div>
    <div class="foot">EduNote · 읽기전용 학습 안내</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-functions.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgSVfgqsbYwjLQI_yMv6-iA7DEfXjLaBE",
  authDomain: "edunote-b199a.firebaseapp.com",
  projectId: "edunote-b199a",
  storageBucket: "edunote-b199a.firebasestorage.app",
  messagingSenderId: "623822141828",
  appId: "1:623822141828:web:d0ad8eef240e14e9ab45d1"
};
const app = initializeApp(firebaseConfig);
const fns = getFunctions(app, "asia-northeast3");
const getParentView = httpsCallable(fns, "getParentView");

// ── 유틸 ──────────────────────────────────────────────
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, function(c){
  return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c]; }); }
function q(id){ return document.getElementById(id); }
function param(name){
  var m = new RegExp("[?&]"+name+"=([^&]+)").exec(location.search);
  return m ? decodeURIComponent(m[1].replace(/\+/g," ")) : "";
}
function fmtDate(s){
  if(!s) return "";
  var m = /^(\d{4})-(\d{2})-(\d{2})/.exec(String(s));
  if(!m) return esc(s);
  var d = new Date(+m[1], +m[2]-1, +m[3]);
  var wd = ["일","월","화","수","목","금","토"][d.getDay()];
  return m[1]+"."+m[2]+"."+m[3]+" ("+wd+")";
}
function fmtTime(ms){
  if(!ms) return "";
  var d = new Date(ms);
  var hh = ("0"+d.getHours()).slice(-2), mm = ("0"+d.getMinutes()).slice(-2);
  return hh+":"+mm;
}
function compClass(n){ return n>=80 ? "hi" : (n>=50 ? "mid" : "lo"); }

// 레슨 블록: base1..base5 (+Comp) → [{text, comp}]. legacy 단일(base) 우선 포함.
function blockItems(rec, base, withLegacy){
  var arr = [];
  if(withLegacy && rec[base] && String(rec[base]).trim()){
    arr.push({ text: String(rec[base]), comp: Number(rec[base+"Comp"])||0 });
  }
  for(var i=1;i<=5;i++){
    var t = rec[base+i];
    if(t && String(t).trim()) arr.push({ text: String(t), comp: Number(rec[base+i+"Comp"])||0 });
  }
  return arr;
}
function homeworkItems(rec){
  var arr = [];
  try { var j = JSON.parse(rec.homeworksJson||"[]");
    if(Array.isArray(j)) j.forEach(function(it){
      var t = (it && typeof it==="object") ? it.text : it;
      if(t && String(t).trim()) arr.push(String(t));
    });
  } catch(e){}
  if(arr.length===0){
    ["homework","homework2","homework3","homework4","homework5"].forEach(function(k){
      if(rec[k] && String(rec[k]).trim()) arr.push(String(rec[k]));
    });
  }
  return arr;
}
function lastHomeworkItems(rec){
  var arr = [];
  try { var j = JSON.parse(rec.lastHomeworksJson||"[]");
    if(Array.isArray(j)) j.forEach(function(it){
      if(it && typeof it==="object"){ if(it.text && String(it.text).trim()) arr.push({ text:String(it.text), comp:(typeof it.comp==="number"?it.comp:-1) }); }
      else if(it && String(it).trim()){ arr.push({ text:String(it), comp:-1 }); }
    });
  } catch(e){}
  if(arr.length===0){
    [["lastHomework","lastCompletion"],["lastHomework2","lastCompletion2"],["lastHomework3","lastCompletion3"],
     ["lastHomework4","lastCompletion4"],["lastHomework5","lastCompletion5"]].forEach(function(p){
      if(rec[p[0]] && String(rec[p[0]]).trim()) arr.push({ text:String(rec[p[0]]), comp:(Number(rec[p[1]])) });
    });
  }
  return arr;
}

// 섹션 렌더 (이행률 배지 모드: 'always' | 'pos' | 'none')
function sec(label, color, items, compMode){
  if(!items || !items.length) return "";
  var rows = items.map(function(it){
    var comp = "";
    var c = (typeof it.comp==="number") ? it.comp : -1;
    var show = compMode==="always" ? (c>=0) : (compMode==="pos" ? (c>0) : false);
    if(show) comp = '<span class="comp '+compClass(c)+'">이행 '+c+'%</span>';
    var text = (typeof it==="string") ? it : it.text;
    return '<div class="item"><span class="txt">'+esc(text)+'</span>'+comp+'</div>';
  }).join("");
  return '<div class="sec"><span class="lbl" style="background:'+color+'">'+esc(label)+'</span>'+rows+'</div>';
}
function plainSec(label, color, items){
  if(!items || !items.length) return "";
  var rows = items.map(function(t){ return '<div class="item"><span class="txt">'+esc(t)+'</span></div>'; }).join("");
  return '<div class="sec"><span class="lbl" style="background:'+color+'">'+esc(label)+'</span>'+rows+'</div>';
}

// ── 과제(records) 카드 ────────────────────────────────
function renderRecord(rec){
  var html = '<div class="card">';
  html += '<div class="date">'+fmtDate(rec.date)+'</div>';
  if(rec.teacher) html += '<div class="by">'+esc(rec.teacher)+' 선생님</div>';

  // 전체 수업내용
  if(rec.todayContent && String(rec.todayContent).trim()){
    html += '<div class="sec"><span class="lbl" style="background:#4f46e5">수업 내용</span><div class="para">'+esc(rec.todayContent)+'</div></div>';
  }
  // 레슨 블록
  html += sec("오늘의 학습", "#4f46e5", blockItems(rec,"today",false), "pos");
  html += sec("독해", "#0891b2", blockItems(rec,"reading",true), "pos");
  html += sec("문법", "#0d9488", blockItems(rec,"grammar",true), "pos");
  html += sec("내신", "#7c3aed", blockItems(rec,"exam",false), "pos");
  html += sec("기타", "#64748b", blockItems(rec,"etc",false), "pos");
  html += sec("보충", "#db2777", blockItems(rec,"supplement",false), "pos");

  // 단어시험
  if((rec.wordTest && String(rec.wordTest).trim()) || (rec.wordScore && String(rec.wordScore).trim())){
    var ws = esc(rec.wordTest||"") + (rec.wordScore ? "  ("+esc(rec.wordScore)+")" : "");
    html += '<div class="sec"><span class="lbl" style="background:#ea580c">단어시험</span><div class="item"><span class="txt">'+ws+'</span></div></div>';
  }

  // 오늘 과제
  html += plainSec("오늘 과제", "#2563eb", homeworkItems(rec));
  // 지난 과제 (이행률)
  html += sec("지난 과제", "#0e7490", lastHomeworkItems(rec), "always");

  // 특이사항
  if(rec.memo && String(rec.memo).trim()){
    html += '<div class="sec"><span class="lbl" style="background:#d97706">특이사항</span><div class="memo">'+esc(rec.memo)+'</div></div>';
  }
  html += '</div>';
  return html;
}

// ── 알림장(notices) 카드 ──────────────────────────────
function renderNotice(n){
  var html = '<div class="card">';
  html += '<div class="date">'+fmtDate(n.date)+'</div>';
  if(n.className) html += '<div class="by">'+esc(n.className)+'</div>';
  if(n.homework && String(n.homework).trim()){
    var lines = String(n.homework).split("\n").filter(function(t){ return t.trim(); });
    html += '<div class="sec"><span class="lbl" style="background:#2563eb">과제</span>'
      + lines.map(function(t){ return '<div class="item"><span class="txt">'+esc(t)+'</span></div>'; }).join("")
      + '</div>';
  }
  if(n.memo && String(n.memo).trim()){
    html += '<div class="sec"><span class="lbl" style="background:#d97706">특이사항</span><div class="memo">'+esc(n.memo)+'</div></div>';
  }
  html += '</div>';
  return html;
}

// ── 출결 ──────────────────────────────────────────────
function attBadge(status){
  var s = String(status||"");
  if(s.indexOf("출석")>=0 || s.indexOf("정상")>=0) return '<span class="badge b-ok">'+esc(s)+'</span>';
  if(s.indexOf("지각")>=0) return '<span class="badge b-late">'+esc(s)+'</span>';
  if(s.indexOf("결석")>=0) return '<span class="badge b-absent">'+esc(s)+'</span>';
  if(s.indexOf("보강")>=0) return '<span class="badge b-makeup">'+esc(s)+'</span>';
  return '<span class="badge b-ok">'+esc(s)+'</span>';
}
function renderAttendance(att){
  var ci = (att && att.checkins) || [];
  var ca = (att && att.classAttendance) || [];
  if(!ci.length && !ca.length) return '<div class="empty">출결 기록이 없습니다.</div>';
  var html = "";
  if(ci.length){
    html += '<div class="sec" style="margin-top:2px"><span class="lbl" style="background:#1d4ed8">등하원</span></div>';
    ci.forEach(function(c){
      var v = "";
      if(c.inAt)  v += '<span class="badge b-in">등원 '+fmtTime(c.inAt)+'</span> ';
      if(c.outAt) v += '<span class="badge b-out">하원 '+fmtTime(c.outAt)+'</span>';
      if(!v) v = '<span style="color:#94a3b8">기록</span>';
      html += '<div class="att-row"><span class="d">'+fmtDate(c.date)+'</span><span class="v">'+v+'</span></div>';
    });
  }
  if(ca.length){
    html += '<div class="sec" style="margin-top:14px"><span class="lbl" style="background:#7c3aed">수업 출결</span></div>';
    ca.forEach(function(a){
      var v = a.status ? attBadge(a.status) : '<span style="color:#94a3b8">기록</span>';
      html += '<div class="att-row"><span class="d">'+fmtDate(a.date)+'</span><span class="v">'+v+'</span></div>';
    });
  }
  return html;
}

// ── 탭 ────────────────────────────────────────────────
window.showTab = function(t){
  ["hw","no","at"].forEach(function(k){
    q("tab-"+k).classList.toggle("on", k===t);
    q("pane-"+k).classList.toggle("hidden", k!==t);
  });
};

function showError(title, sub){
  q("stateView").innerHTML = '<div class="ic">🔒</div><div class="t">'+esc(title)+'</div><div class="s">'+esc(sub||"")+'</div>';
  q("stateView").classList.remove("hidden");
  q("mainView").classList.add("hidden");
}

// ── 진입 ──────────────────────────────────────────────
(async function(){
  var token = param("t");
  if(!token){ showError("잘못된 링크입니다", "학원에서 받은 링크로 다시 접속해주세요."); return; }
  try {
    var res = await getParentView({ token: token });
    var d = res && res.data;
    if(!d || !d.ok){ showError("불러올 수 없습니다", "잠시 후 다시 시도해주세요."); return; }

    q("schoolName").textContent = d.school && d.school.name ? d.school.name : "";
    q("stuName").textContent = (d.student && d.student.name) || "학생";
    if(d.student && d.student.className){
      q("stuClass").textContent = d.student.className;
      q("stuClass").classList.remove("hidden");
    }

    var recs = d.records || [], nots = d.notices || [], att = d.attendance || {};
    q("cnt-hw").textContent = recs.length ? recs.length : "";
    q("cnt-no").textContent = nots.length ? nots.length : "";
    var atCnt = ((att.checkins||[]).length) + ((att.classAttendance||[]).length);
    q("cnt-at").textContent = atCnt ? atCnt : "";

    q("pane-hw").innerHTML = recs.length ? recs.map(renderRecord).join("") : '<div class="empty">등록된 과제가 없습니다.</div>';
    q("pane-no").innerHTML = nots.length ? nots.map(renderNotice).join("") : '<div class="empty">알림장이 없습니다.</div>';
    q("pane-at").innerHTML = renderAttendance(att);

    q("stateView").classList.add("hidden");
    q("mainView").classList.remove("hidden");
  } catch(err){
    var code = err && err.code ? String(err.code) : "";
    if(code.indexOf("permission-denied")>=0) showError("만료된 링크입니다", "학원에 새 링크를 요청해주세요.");
    else if(code.indexOf("not-found")>=0 || code.indexOf("invalid-argument")>=0) showError("잘못된 링크입니다", "학원에서 받은 링크로 다시 접속해주세요.");
    else showError("불러올 수 없습니다", "네트워크 상태를 확인하고 다시 시도해주세요.");
  }
})();
</script>
</body>
</html>
